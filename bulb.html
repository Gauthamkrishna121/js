<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BULB</title>
    <link rel="Stylesheet" href="b.css">
</head>
<body>
    <div class="content">
        <div class="main">
            <p>THIS IS A BULB PROJECT</p>
            <div class="bulb">
                <img id="bullb" src="img/lightbulb.svg" alt="Bulb OFF">
            </div>
            <div class="button">
                <button onclick='document.getElementById("bullb").src="img/lightbulb.svg"'><img src="img/toggle2-off.svg"></button>
                <button onclick='document.getElementById("bullb").src="img/lightbulb-fill.svg"'><img src="img/toggle-on.svg"></button>

            </div>

        </div>

    </div>
</body>
</html>
