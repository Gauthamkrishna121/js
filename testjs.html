<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        function loop(){
            var a = [1,2,3,4,5];
            for(var i in a){
                var b = map(a[i])
            }
            return b
        }
    </script>
</head>
<body>
    <p id="babu">Numbers</p>
    <input type="button" onclick="document.getElementById('babu').innerHTML=loop()">
</body>
</html>
